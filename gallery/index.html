<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Temple Of Our Memories ❤️
</title>

<link rel="stylesheet"
href="gallery.css">

</head>

<body>

<div class="hearts"></div>

<!-- =========================
HEADER
========================= -->

<header>

<a href="../index.html"
class="home-btn">

🏠 Home

</a>

<h1>

📸 Temple Of Our Memories ❤️

</h1>

<p>

A universe built from our moments.

</p>

</header>

<!-- =========================
FEATURED MEMORY
========================= -->

<section
id="featuredMemory"
class="featured-memory">

</section>

<!-- =========================
TODAY MEMORY
========================= -->

<section
id="todayMemory"
class="today-memory">

</section>

<!-- =========================
STATS
========================= -->

<section class="stats-section">

<div
id="memoryStats"
class="stats-grid">

</div>

</section>

<!-- =========================
TOP ACTIONS
========================= -->

<section class="top-actions">

<button
class="surprise-btn"
onclick="showRandomMemory()">

💖 Surprise Me

</button>

<button
class="story-btn"
onclick="startStory()">

🎞️ Relive Our Story

</button>

</section>

<!-- =========================
OUR SONG
========================= -->

<section class="music-section">

<h2>

🎵 Our Song

</h2>

<p>

Upload a special song and relive memories together.

</p>

<input
type="file"
id="musicUpload"
accept="audio/*">

<audio
id="loveMusic"
controls>

</audio>

</section>

<!-- =========================
KRISHNA BLESSING
========================= -->

<section
class="krishna-section">

<div class="krishna-card">

<h2>

🦚 Krishna's Blessing

</h2>

<h3>

17 January 2025

</h3>

<p>

Tuljapur Blessing ❤️

</p>

<blockquote>

"Some meetings are written
before we are born."

</blockquote>

</div>

</section>

<!-- =========================
UPLOAD MEMORY
========================= -->

<section class="upload-section">

<h2>

✨ Add New Memory

</h2>

<!-- SINGLE IMAGE -->

<label>

📸 Select Photos

</label>

<input
type="file"
id="imageFile"
accept="image/*"
multiple>

<label>

📂 Select Entire Folder

</label>

<input
type="file"
id="folderUpload"
webkitdirectory
multiple>

<input
type="text"
id="photoTitle"
placeholder="Memory Title (Optional)">

<input
type="text"
id="photoFolder"
placeholder="Create Album Name (Example: Goa Trip ❤️)">

<input
type="date"
id="photoDate">

<textarea
id="photoNote"
placeholder="Memory Note (Optional)">
</textarea>

<label class="favorite-box">

<input
type="checkbox"
id="favoriteMemory">

⭐ Favorite Memory

</label>

<button
onclick="uploadPhoto()">

📸 Save Memory

</button>

<button
onclick="uploadFolder()">

📂 Upload Folder

</button>

</section>

<!-- =========================
FOLDERS
========================= -->

<section
id="folderSection">

</section>

<!-- =========================
FULLSCREEN VIEWER
========================= -->

<div
id="viewer"
class="viewer">
<div
class="viewer-card">

<img
id="viewerImage">

<h2
id="viewerTitle">

</h2>

<p
id="viewerDate">

</p>

<p
id="viewerNote">

</p>

</div>

</div>

<!-- =========================
STORY MODE
========================= -->

<div
id="storyMode"
class="story-mode">

<div
class="story-content">

<img
id="storyImage">

<h2
id="storyTitle">

</h2>

<p
id="storyDate">

</p>

<p
id="storyNote">

</p>

<button
onclick="closeStory()">

❌ Close Story

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="gallery.js"></script>

</body>
</html>
