<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>❤️ Our Journey ❤️</title>

<link rel="stylesheet"
href="timeline.css">

</head>

<body>

<div id="stars"></div>

<!-- NAV -->

<nav>

<a href="../index.html">
🏠 Home
</a>

</nav>

<!-- HERO -->

<section class="hero">

<h1>
❤️ Our Journey ❤️
</h1>

<p>

Every memory tells a story.
Every story deserves forever.

</p>

</section>

<!-- STATS -->

<section class="stats-section">

<div class="stat-card">

<h2 id="totalEvents">
0
</h2>

<p>
Total Memories
</p>

</div>

<div class="stat-card">

<h2 id="daysTogether">
0
</h2>

<p>
Days Since Proposal
</p>

</div>

<div class="stat-card">

<h2 id="favoriteCount">
0
</h2>

<p>
Hall Of Memories
</p>

</div>

</section>

<!-- HALL OF MEMORIES -->

<section class="hall-section">

<h2>
⭐ Hall Of Memories ⭐
</h2>

<div id="hallContainer">

</div>

</section>

<!-- SEARCH -->

<section class="search-section">

<input
type="text"
id="searchInput"
placeholder="Search memories..."
onkeyup="renderTimeline()">

</section>

<!-- ADD EVENT -->

<section class="form-section">

<h2>
➕ Add New Memory
</h2>

<input
type="text"
id="eventIcon"
placeholder="Icon ❤️ 🫂 😘 ☕">

<input
type="text"
id="eventTitle"
placeholder="Event Title">

<input
type="date"
id="eventDate">

<input
type="time"
id="eventTime">

<textarea
id="eventNote"
placeholder="Write memory note...">
</textarea>

<label class="favorite-label">

<input
type="checkbox"
id="eventFavorite">

⭐ Add To Hall Of Memories

</label>

<button
onclick="saveEvent()">

Save Memory ❤️

</button>

</section>

<!-- TIMELINE -->

<section class="timeline-wrapper">

<div class="timeline-line"></div>

<div id="timelineContainer">

</div>

</section>

<script src="timeline.js"></script>

</body>

</html>
