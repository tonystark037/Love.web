<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timeline ❤️</title>

<link rel="stylesheet" href="timeline.css">

</head>

<body>

<header>

<a href="../index.html" class="home-btn">
🏠 Home
</a>

<h1>📅 Our Timeline ❤️</h1>

<p>
Every moment has a story.
</p>

</header>

<!-- LOVE COUNTERS -->

<section class="love-counters">

<div class="counter-card">
<h3>💍 Proposal</h3>
<div id="proposalCounter">0 Days</div>
</div>

<div class="counter-card">
<h3>❤️ Said Yes</h3>
<div id="yesCounter">0 Days</div>
</div>

<div class="counter-card">
<h3>🤗 First Hug</h3>
<div id="hugCounter">0 Days</div>
</div>

<div class="counter-card">
<h3>💋 First Kiss</h3>
<div id="kissCounter">0 Days</div>
</div>

</section>

<!-- SEARCH -->

<section class="controls">

<input
type="text"
id="searchBox"
placeholder="Search timeline..."
oninput="renderEvents()">

</section>

<!-- EVENT FORM -->

<section class="event-form">

<input
type="date"
id="eventDate">

<input
type="text"
id="eventTitle"
placeholder="Event Title">

<textarea
id="eventShort"
placeholder="Short Story">
</textarea>

<textarea
id="eventNote"
placeholder="Personal Note">
</textarea>

<label class="memory-check">

<input
type="checkbox"
id="hallMemory">

🏛️ Add to Hall of Memories

</label>

<button onclick="saveEvent()">
✨ Save Event
</button>

</section>

<!-- HALL OF MEMORIES -->

<section class="hall-section">

<h2>
🏛️ Hall of Memories
</h2>

<div
id="hallContainer"
class="hall-grid">
</div>

</section>

<!-- TIMELINE -->

<section class="timeline-wrapper">

<div class="timeline-line"></div>

<div
id="timelineContainer"
class="timeline-container">
</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="timeline.js"></script>

</body>
</html>
