<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Journey ❤️</title>

<link rel="stylesheet" href="timeline.css">

</head>

<body>

<div id="stars"></div>

<nav>

<a href="../index.html">🏠 Home</a>

</nav>

<header class="hero">

<h1>❤️ Our Journey ❤️</h1>

<p>
Every memory is a milestone.
Every milestone is a chapter.
</p>

<div class="stats">

<div class="stat-box">
<h2 id="totalEvents">0</h2>
<p>Total Memories</p>
</div>

<div class="stat-box">
<h2 id="daysTogether">0</h2>
<p>Days Since Proposal</p>
</div>

<div class="stat-box">
<h2 id="favoriteCount">0</h2>
<p>Hall Of Memories</p>
</div>

</div>

</header>

<section class="hall-section">

<h2>⭐ Hall Of Memories ⭐</h2>

<div id="hallContainer"></div>

</section>

<section class="controls">

<input
type="text"
id="searchInput"
placeholder="Search memories..."
onkeyup="renderTimeline()">

</section>

<section class="event-form">

<h2>Add New Memory ❤️</h2>

<input
type="text"
id="eventIcon"
placeholder="Icon (❤️ 🫂 😘 ☕ 💍)">

<input
type="text"
id="eventTitle"
placeholder="Event Title">

<input
type="date"
id="eventDate">

<input
type="time"
id="eventTime">

<textarea
id="eventNote"
placeholder="Memory Note">
</textarea>

<label class="favorite-label">

<input
type="checkbox"
id="eventFavorite">

⭐ Add To Hall Of Memories

</label>

<button onclick="saveEvent()">

➕ Save Memory

</button>

</section>

<section class="timeline-wrapper">

<div class="timeline-line"></div>

<div id="timelineContainer">

</div>

</section>

<script src="timeline.js"></script>

</body>

</html>
